<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      font-family: 'Inter', system-ui, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #ff4757;
      box-shadow: 0 0 6px #ff4757;
    }
    .title { font-size: 15px; font-weight: 700; }
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #1a1d27;
      border: 1px solid #2e3347;
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 12px;
    }
    .toggle-label { font-size: 13px; color: #8892a4; }
    .toggle {
      width: 44px; height: 24px;
      border-radius: 12px;
      cursor: pointer;
      position: relative;
      transition: background 0.2s;
      border: 1px solid #2e3347;
    }
    .toggle.on { background: #2ed573; border-color: rgba(46,213,115,0.3); }
    .toggle.off { background: #22263a; }
    .toggle-knob {
      width: 18px; height: 18px;
      border-radius: 50%;
      position: absolute;
      top: 2px;
      transition: left 0.2s;
    }
    .toggle.on .toggle-knob { left: 22px; background: #000; }
    .toggle.off .toggle-knob { left: 2px; background: #4a5568; }
    .status-text {
      font-size: 12px;
      font-weight: 700;
    }
    .status-text.on { color: #2ed573; }
    .status-text.off { color: #ff4757; }
    .url-checker {
      background: #1a1d27;
      border: 1px solid #2e3347;
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 12px;
    }
    .url-checker input {
      width: 100%;
      background: #22263a;
      border: 1px solid #2e3347;
      border-radius: 6px;
      padding: 7px 10px;
      color: #e2e8f0;
      font-size: 12px;
      outline: none;
      margin-bottom: 8px;
      font-family: monospace;
    }
    .check-btn {
      width: 100%;
      padding: 8px;
      background: #3d9bff;
      border: none;
      border-radius: 6px;
      color: #000;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }
    .result {
      margin-top: 8px;
      padding: 8px 10px;
      border-radius: 6px;
      font-size: 11px;
      line-height: 1.5;
    }
    .result.blocked {
      background: rgba(255,71,87,0.12);
      border: 1px solid rgba(255,71,87,0.35);
      color: #ff4757;
    }
    .result.safe {
      background: rgba(46,213,115,0.1);
      border: 1px solid rgba(46,213,115,0.3);
      color: #2ed573;
    }
    .result.checking {
      background: rgba(61,155,255,0.1);
      border: 1px solid rgba(61,155,255,0.3);
      color: #3d9bff;
    }
    .stages {
      display: grid;
      grid-template-columns: repeat(7,1fr);
      gap: 2px;
      margin-top: 8px;
    }
    .stage-cell {
      text-align: center;
      padding: 3px 2px;
      border-radius: 4px;
      font-size: 8px;
    }
    .stage-cell.pass { background: rgba(46,213,115,0.15); color: #2ed573; }
    .stage-cell.fail { background: rgba(255,71,87,0.15); color: #ff4757; }
    .stage-cell.unknown { background: #22263a; color: #4a5568; }
    .recent {
      background: #1a1d27;
      border: 1px solid #2e3347;
      border-radius: 10px;
      padding: 12px;
    }
    .recent-title {
      font-size:10px; font-weight:600; color:#4a5568;
      text-transform:uppercase; letter-spacing:0.06em;
      margin-bottom:8px;
    }
    .recent-item {
      display:flex; align-items:center; gap:6px;
      padding: 5px 0;
      border-bottom: 1px solid #1a1d27;
      font-size: 10px;
    }
    .recent-item:last-child { border-bottom: none; }
    .dot-small {
      width:5px; height:5px; border-radius:50%; flex-shrink:0;
    }
    .footer {
      margin-top:10px;
      font-size:9px;
      color:#4a5568;
      text-align:center;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="dot"></div>
    <span class="title">SSRF Guardian</span>
  </div>

  <!-- ON/OFF Toggle -->
  <div class="toggle-row">
    <span class="toggle-label">Protection</span>
    <div style="display:flex;align-items:center;gap:8px">
      <div class="toggle off" id="toggle">
        <div class="toggle-knob"></div>
      </div>
      <span class="status-text off" id="status-text">OFF</span>
    </div>
  </div>

  <!-- URL Checker -->
  <div class="url-checker">
    <div style="font-size:10px;color:#4a5568;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.06em;">Check any URL</div>
    <input id="url-input" placeholder="https://example.com" type="url" />
    <button class="check-btn" id="check-btn">Analyze URL</button>
    <div id="result"></div>
  </div>

  <!-- Recent blocks -->
  <div class="recent">
    <div class="recent-title">Recent blocks</div>
    <div id="recent-list">
      <div style="font-size:11px;color:#4a5568">No blocks yet</div>
    </div>
  </div>

  <div class="footer">Backend: localhost:3000 · SSRF Guardian v1.0</div>

 <script src="popup.js"></script>
</body>
</html>
